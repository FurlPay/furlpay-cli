name: Publish to MCP Registry

# Publishes server.json to the official MCP Registry
# (registry.modelcontextprotocol.io). The npm package itself is released
# separately; this only pushes the registry metadata.
#
# Auth is GitHub OIDC: running in the FurlPay org grants the
# io.github.furlpay/* namespace — no secrets required.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  id-token: write # OIDC authentication to the MCP Registry
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
